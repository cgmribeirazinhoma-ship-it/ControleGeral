<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Controle Geral - Prefeitura Gov. Edison Lobão</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#006000">
    <style>
        body { margin: 0; background: #006000; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; overflow: hidden; }
        #initial-loader {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; color: #EFD103; text-align: center;
            position: fixed; top: 0; left: 0; right: 0; bottom: 0; z-index: 9999; background: #006000;
        }
        .spinner {
            width: 50px; height: 50px; border: 5px solid rgba(239,209,3,0.1);
            border-left-color: #EFD103; border-radius: 50%; animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        #error-screen { display: none; padding: 20px; color: #fff; text-align: center; position: fixed; inset: 0; background: #450a0a; z-index: 10000; overflow-y: auto; }
        #error-screen b { color: #fca5a5; display: block; margin: 10px 0; font-family: monospace; font-size: 14px; }
        .btn {
            margin: 5px; padding: 12px 24px; background: #EFD103; color: #000;
            border: none; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 14px;
        }
        .btn-sec { background: rgba(255,255,255,0.2); color: #fff; }
        #log { font-family: monospace; font-size: 10px; color: #94a3b8; margin-top: 20px; max-width: 90%; line-height: 1.4; text-align: left; white-space: pre-wrap; opacity: 0.8; }
    </style>
</head>
<body>
    <div id="initial-loader">
        <div class="spinner"></div>
        <div style="font-weight: bold; letter-spacing: 0.05em; font-size: 18px;">CONTROLE GERAL</div>
        <div style="font-size: 13px; opacity: 0.8; margin-top: 5px;">Carregando sistema...</div>
        <div id="log">Iniciando...</div>
    </div>

    <div id="error-screen">
        <div style="font-size: 40px; margin-bottom: 10px;">⚠️</div>
        <h3 style="margin: 0;">Erro ao carregar o sistema</h3>
        <p style="opacity: 0.8; font-size: 14px;">Não foi possível inicializar a aplicação.</p>
        <b id="error-msg">Erro desconhecido</b>
        <div style="margin: 20px 0;">
            <button class="btn" onclick="location.reload()">Tentar novamente</button>
            <button class="btn btn-sec" onclick="clearAndReload()">Limpar Cache</button>
        </div>
        <div id="log-error" style="font-family:monospace; font-size:10px; text-align:left; background:rgba(0,0,0,0.3); padding:10px; border-radius:5px;"></div>
    </div>

    <div id="root"></div>

    <script>
        window.AppMounted = false;
        var logs = [];
        function addLog(msg) {
            console.log('[Init]', msg);
            logs.push(msg);
            var el = document.getElementById('log');
            if (el) el.textContent = logs.join('\n> ');
            var elErr = document.getElementById('log-error');
            if (elErr) elErr.textContent = logs.join('\n> ');
        }
        function showError(msg) {
            addLog('ERRO: ' + msg);
            var loader = document.getElementById('initial-loader');
            var screen = document.getElementById('error-screen');
            var msgEl = document.getElementById('error-msg');
            if (loader) loader.style.display = 'none';
            if (screen) screen.style.display = 'block';
            if (msgEl) msgEl.textContent = msg;
        }
        function clearAndReload() {
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.getRegistrations().then(function(regs) {
                    for(var i=0; i<regs.length; i++) regs[i].unregister();
                    caches.keys().then(function(keys) {
                        for(var j=0; j<keys.length; j++) caches.delete(keys[j]);
                        location.reload(true);
                    });
                });
            } else {
                location.reload(true);
            }
        }
        window.onerror = function(msg, url, line, col, error) {
            showError(msg + ' (Linha: ' + line + ')');
            return false;
        };
    </script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js" onload="addLog('React OK')" onerror="showError('Falha React')"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js" onload="addLog('ReactDOM OK')" onerror="showError('Falha ReactDOM')"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js" onload="addLog('XLSX OK')"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js" onload="addLog('jsPDF OK')"></script>
    <script src="https://cdn.jsdelivr.net/npm/docx@8.5.0/build/index.umd.js" onload="addLog('docx OK')"></script>

    <script src="/brasao.js" onload="addLog('Brasao OK')" onerror="showError('Falha brasao.js')"></script>
    <script src="/app.js?v=4.9.2" onload="addLog('App Script OK')" onerror="showError('Falha app.js')"></script>

    <script>
        function mountApp() {
            if (window.AppMounted) return;
            addLog('Iniciando montagem...');
            try {
                if (window.App && window.ReactDOM && window.React) {
                    var rootElement = document.getElementById('root');
                    if (rootElement) {
                        var root = ReactDOM.createRoot(rootElement);
                        root.render(React.createElement(window.App));
                        window.AppMounted = true;
                        addLog('Pronto!');
                        setTimeout(function() {
                            var loader = document.getElementById('initial-loader');
                            if (loader) loader.style.display = 'none';
                            document.body.style.overflow = 'auto';
                        }, 1200);
                    } else {
                        showError('Elemento #root ausente');
                    }
                } else {
                    var missing = [];
                    if (!window.React) missing.push('React');
                    if (!window.ReactDOM) missing.push('ReactDOM');
                    if (!window.App) missing.push('App');
                    showError('Faltando: ' + missing.join(', '));
                }
            } catch (err) {
                showError('Erro execução: ' + err.message);
            }
        }
        window.addEventListener('load', function() {
            setTimeout(mountApp, 200);
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('/sw.js').then(function() { addLog('PWA OK'); }).catch(function(e) { console.warn('PWA Fail:', e); });
            }
        });
    </script>
</body>
</html>
