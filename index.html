<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#006000" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black" />
  <meta name="apple-mobile-web-app-title" content="ControleGeral" />
  <meta name="description" content="Sistema de Controle de Processos de Pagamento — Prefeitura Gov. Edison Lobão" />
  <title>ControleGeral — Prefeitura Gov. Edison Lobão</title>
  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%23006000'/><text y='.9em' font-size='80' text-anchor='middle' x='50'>⚖️</text></svg>" />

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', system-ui, -apple-system, sans-serif; background: #006000; }
    #loading {
      position: fixed; inset: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center; background: #006000; z-index: 9999;
      gap: 18px; transition: opacity .4s;
    }
    #loading.hide { opacity: 0; pointer-events: none; }
    #loading-bar-wrap {
      width: 180px; height: 4px; background: rgba(255,255,255,.15); border-radius: 4px;
    }
    #loading-bar {
      height: 100%; background: #EFD103; border-radius: 4px;
      animation: load 1.4s ease-in-out infinite alternate;
    }
    #loading-msg { font-size: 13px; color: #4ade80; font-weight: 600; letter-spacing: .04em; }
    @keyframes load { from { width: 20%; } to { width: 90%; } }
  </style>
</head>
<body>

  <!-- Tela de carregamento enquanto os scripts CDN são baixados -->
  <div id="loading">
    <img src="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%23003d00'/><text y='.9em' font-size='80' text-anchor='middle' x='50'>⚖️</text></svg>"
         width="64" height="64" style="border-radius:16px" alt="ControleGeral" />
    <div id="loading-bar-wrap"><div id="loading-bar"></div></div>
    <div id="loading-msg">Carregando sistema...</div>
  </div>

  <!-- Container React -->
  <div id="root"></div>

  <!-- ── Dependências CDN ───────────────────────────────────────────────────── -->
  <!-- React 18 -->
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <!-- SheetJS (Excel) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

  <!-- ── Brasão (gerado separadamente) ─────────────────────────────────────── -->
  <!-- Se existir brasao.js no repositório, ele define window.BRASAO_B64 -->
  <script>
    // Tenta carregar brasao.js; se não existir, não quebra
    (function() {
      var s = document.createElement('script');
      s.src = '/brasao.js';
      s.onerror = function() {}; // silencia erro 404
      document.head.appendChild(s);
    })();
  </script>

  <!-- ── Sistema principal ──────────────────────────────────────────────────── -->
  <script src="/src/app.js"></script>

  <!-- ── Inicialização React ───────────────────────────────────────────────── -->
  <script>
    // Aguarda React e o App estarem disponíveis
    function initApp() {
      if (typeof React === 'undefined' || typeof ReactDOM === 'undefined' || typeof window.App === 'undefined') {
        setTimeout(initApp, 50);
        return;
      }
      try {
        var root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(React.createElement(window.App));
        // Esconde tela de carregamento
        var loading = document.getElementById('loading');
        if (loading) {
          loading.classList.add('hide');
          setTimeout(function() { loading.remove(); }, 500);
        }
      } catch(e) {
        document.getElementById('loading-msg').textContent = 'Erro ao iniciar: ' + e.message;
        document.getElementById('loading-msg').style.color = '#fca5a5';
        console.error('Erro ao iniciar App:', e);
      }
    }
    initApp();

    // Service Worker (PWA offline)
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function() {
        navigator.serviceWorker.register('/sw.js')
          .then(function(r) { console.info('[SW] Registrado:', r.scope); })
          .catch(function(e) { console.warn('[SW] Falhou (não crítico):', e.message); });
      });
    }
  </script>
</body>
</html>
