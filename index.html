<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App</title>
</head>
<body>
    <div id="root"></div>
    <script>
        // Check for window.App before initializing React
        if (window.App) {
            const rootElement = document.getElementById('root');
            if (rootElement) {
                const root = ReactDOM.createRoot(rootElement);
                root.render(<App />);
            } else {
                console.error('Error: Root element not found.');
            }
        } else {
            console.error('Error: window.App is not defined.');
        }
    </script>
</body>
</html>
